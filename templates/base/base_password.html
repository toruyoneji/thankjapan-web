{% extends 'base/base_top.html' %}
{% load static %}

{% block content %}
<style>
:root {
    color-scheme: light !important;
    --washi: #faf6ec;
    --washi-card: #ffffff;
    --ink: #2a1d13;
    --gold: #d4af37;
    --wood-border: #e8dfc8;
}

html, body {
    background-color: var(--washi) !important;
    margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
}

#premium-auth-container {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100dvh;
    background-color: var(--washi) !important;
    overflow: hidden; z-index: 1;
}

.app-content-fix {
    width: 100%; height: 100%;
    background-color: var(--washi) !important;
    display: flex; align-items: center; justify-content: center;
    overflow-y: auto !important;
}

.main2 {
    max-width: 500px; width: 90%; margin: 20px auto;
    background: var(--washi-card) !important;
    padding: 40px 30px; border-radius: 20px;
    border: 1px solid var(--wood-border) !important;
    box-shadow: 0 10px 30px rgba(42, 29, 19, 0.05);
    text-align: center;
}

h2 {
    font-family: 'Zen Antique', serif; font-size: 1.8rem;
    color: #b22d35; 
    margin-bottom: 20px;
}

p {
    font-size: 1.05rem; line-height: 1.8;
    color: var(--ink); margin-bottom: 25px;
}

input[type="email"], input[type="password"], input[type="text"] {
    width: 100%; padding: 14px 16px; border-radius: 12px;
    border: 1px solid var(--wood-border);
    background: var(--washi-card); font-size: 1.1rem;
    color: var(--ink); margin-bottom: 20px; box-sizing: border-box;
}


button[type="submit"] {
    background: #0070ba !important; color: #fff !important;
    border: none !important; padding: 16px !important;
    width: 100% !important; border-radius: 50px !important;
    font-size: 1.1rem !important; font-weight: 700 !important;
    cursor: pointer; transition: all 0.3s ease;
}

button[type="submit"]:hover { background: #005ea6 !important; transform: translateY(-2px); }


.back-link {
    display: inline-block; margin-top: 25px;
    color: var(--ink); text-decoration: none; font-weight: 600;
}
</style>

<div id="premium-auth-container">
    <div class="app-content-fix">
        <div class="main2">
            {% block password_content %}{% endblock %}
        </div>
    </div>
</div>
{% endblock %}

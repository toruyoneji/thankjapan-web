{% extends 'base/base_top.html' %}
{% load static %}

{% block content %}
<style>
:root {
    color-scheme: light !important;
    --washi: #faf6ec;
    --washi-card: #ffffff;
    --ink: #2a1d13;
    --gold: #d4af37;
    --wood-border: #e8dfc8;
}

html, body {
    background-color: var(--washi) !important;
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

#premium-auth-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100dvh;
    background-color: var(--washi) !important;
    overflow: hidden;
    z-index: 1;
}

.app-content-fix {
    width: 100%;
    height: 100%;
    background-color: var(--washi) !important;
    overflow-y: auto !important;
    -webkit-overflow-scrolling: touch;
    padding-top: 100px;
    padding-bottom: 180px;
}

.app-content-fix::-webkit-scrollbar {
    display: none;
}

.main2 {
    max-width: 500px;
    margin: 0 auto;
    padding: 0 24px;
    background-color: transparent !important;
}

h2 {
    text-align: center;
    font-family: 'Zen Antique', serif;
    font-size: 2rem;
    color: var(--ink);
    margin-bottom: 30px;
}

label {
    display: block;
    margin-bottom: 8px;
    font-weight: 700;
    color: var(--ink);
    font-size: 1rem;
}

input, textarea {
    width: 100% !important;
    padding: 14px 16px !important;
    border-radius: 12px !important;
    border: 1px solid var(--wood-border) !important;
    background: var(--washi-card) !important;
    font-size: 1.1rem !important;
    color: var(--ink) !important;
    margin-bottom: 20px;
    box-sizing: border-box;
}

input:focus, textarea:focus {
    border-color: var(--gold) !important;
    outline: none !important;
}

button[type="submit"] {
    background: #0070ba !important;
    color: #ffffff !important;
    border: none !important;
    padding: 16px !important;
    width: 100% !important;
    border-radius: 50px !important;
    font-size: 1.1rem !important;
    font-weight: 700 !important;
    cursor: pointer;
    margin-top: 10px;
    box-shadow: 0 4px 12px rgba(0, 112, 186, 0.2) !important;
    transition: all 0.3s ease !important;
}

button[type="submit"]:hover {
    background: #005ea6 !important;
    transform: translateY(-2px) !important;
    box-shadow: 0 6px 15px rgba(0, 112, 186, 0.3) !important;
}

button[type="submit"]:active {
    transform: translateY(0px) !important;
}


.btn-more {
    display: inline-block !important;
    background: var(--ink) !important; 
    color: #ffffff !important; 
    border: none !important;
    padding: 14px 32px !important;
    border-radius: 50px !important;
    text-decoration: none !important;
    font-weight: 700 !important;
    font-size: 1rem !important;
    margin-top: 40px !important;
    box-shadow: 0 4px 12px rgba(42, 29, 19, 0.15) !important;
    transition: all 0.3s ease !important;
}

.btn-more:hover {
    background: #000000 !important;
    transform: translateY(-2px) !important;
    box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2) !important;
}

.btn-more:active {
    transform: translateY(0px) !important;
}
.error {
    color: #d32f2f;
    font-size: 0.9rem;
    margin-top: -15px;
    margin-bottom: 15px;
}

* {
    -webkit-tap-highlight-color: transparent;
    outline: none !important;
}
</style>

<div id="premium-auth-container">
    <div class="app-content-fix">
        <div class="main2">
            {% block contact_content %}{% endblock %}
        </div>
    </div>
</div>
{% endblock %}

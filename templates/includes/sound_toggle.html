<button id="global-sound-toggle" class="sound-toggle-header" type="button" aria-label="Toggle Sound">
    <span id="global-sound-icon">🔊</span>
</button>

<style>
.sound-toggle-header {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(212, 175, 55, 0.6);
    color: #fff;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    cursor: pointer;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
}
.sound-toggle-header:active {
    transform: scale(0.9);
}
</style>

<script>
(function() {
    function isSoundOn() {
        return localStorage.getItem('thankjapan_sound') !== 'off'; // 未設定はON扱い
    }

    function applyState() {
        const icon = document.getElementById('global-sound-icon');
        if (icon) icon.textContent = isSoundOn() ? '🔊' : '🔇';

        const bgm = document.getElementById('bgm-player');
        if (bgm) bgm.muted = !isSoundOn();
    }

    document.addEventListener('DOMContentLoaded', function() {
        applyState();

        const btn = document.getElementById('global-sound-toggle');
        if (!btn) return;

        btn.addEventListener('click', function(e) {
            e.preventDefault();
            const newState = isSoundOn() ? 'off' : 'on';
            localStorage.setItem('thankjapan_sound', newState);
            applyState();

            const bgm = document.getElementById('bgm-player');
            if (bgm && newState === 'on') {
                bgm.play().catch(() => {});
            }
        });
    });
})();
</script>

<button id="global-sound-toggle" class="sound-toggle-header" type="button" aria-label="Toggle Sound" style="margin-right: 4px;">
    <span id="global-sound-icon">🔊</span>
    <span class="sound-toggle-label">
        {% if lang_code == 'ja' %}音
        {% elif lang_code == 'zh-hant' %}聲音
        {% elif lang_code == 'zh-cn' %}声音
        {% elif lang_code == 'de' %}Ton
        {% elif lang_code == 'fr' %}Son
        {% elif lang_code == 'es-es' or lang_code == 'es-mx' %}Sonido
        {% elif lang_code == 'it' %}Suono
        {% elif lang_code == 'ko' %}소리
        {% elif lang_code == 'pt' or lang_code == 'pt-br' %}Som
        {% elif lang_code == 'vi' %}Âm thanh
        {% elif lang_code == 'th' %}เสียง
        {% else %}Sound{% endif %}
    </span>
</button>

<style>
.sound-toggle-header {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(212, 175, 55, 0.6);
    color: #fff;
    height: 36px;
    padding: 0 12px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.8rem;
    font-weight: bold;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
}
.sound-toggle-header:active {
    transform: scale(0.95);
}
.sound-toggle-label {
    font-family: 'Zen Antique', 'Shippori Mincho', 'Noto Serif JP', serif;
}
</style>


<script>
(function() {
    function isSoundOn() {
        return localStorage.getItem('thankjapan_sound') !== 'off'; // 未設定はON扱い
    }

    function applyState() {
        const icon = document.getElementById('global-sound-icon');
        if (icon) icon.textContent = isSoundOn() ? '🔊' : '🔇';

        const bgm = document.getElementById('bgm-player');
        if (bgm) bgm.muted = !isSoundOn();
    }

    document.addEventListener('DOMContentLoaded', function() {
        applyState();

        const btn = document.getElementById('global-sound-toggle');
        if (!btn) return;

        btn.addEventListener('click', function(e) {
            e.preventDefault();
            const newState = isSoundOn() ? 'off' : 'on';
            localStorage.setItem('thankjapan_sound', newState);
            applyState();

            const bgm = document.getElementById('bgm-player');
            if (bgm && newState === 'on') {
                bgm.play().catch(() => {});
            }
        });
    });
})();
</script>

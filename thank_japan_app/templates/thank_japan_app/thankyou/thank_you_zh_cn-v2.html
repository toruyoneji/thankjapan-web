{% extends 'base/base_top.html' %}
{% block content %}
<style>
:root {
    color-scheme: light !important;
    --washi: #faf6ec;
    --gold: #d4af37;
    --gold-dark: #a97c1f;
    --ink: #2a1d13;
    --washi-card: #ffffff;
}


#premium-auth-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100dvh;
    overflow: hidden;
    background-color: var(--washi) !important;
    z-index: 100;
}


.app-content-fix {
    height: 100%;
    width: 100%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
}


.main2 {
    flex: 1;
    width: 100%;
    max-width: 640px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
}


.thank-you-card {
    background: var(--washi-card);
    width: 100%;
    padding: 50px 30px;
    border: 3px solid var(--gold);
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    text-align: center;
}

.thank-you-card h1 {
    color: #b22d35; 
    font-family: 'Zen Antique', serif;
    font-size: 1.8rem;
    margin-bottom: 10px;
}

.thank-you-card h2 {
    font-size: 1.2rem;
    color: var(--ink);
    margin-bottom: 25px;
    font-weight: 600;
}

.thank-you-card p {
    font-size: 1rem;
    margin: 20px 0;
    line-height: 1.8;
    color: var(--ink);
}

.thank-you-card strong {
    color: var(--gold-dark);
}


.back-home-btn {
    display: inline-block;
    background: linear-gradient(135deg, #d4af37, #ffd700);
    color: #000;
    padding: 16px 40px;
    border-radius: 999px;
    text-decoration: none;
    font-weight: bold;
    font-size: 1rem;
    margin-top: 25px;
    box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
    transition: transform 0.2s ease;
    border: none;
}

.back-home-btn:active {
    transform: translateY(2px);
}


.premium-sparkle {
    font-size: 2rem;
    margin-bottom: 10px;
    display: block;
}
</style>


<div id="premium-auth-container">
    <div class="app-content-fix">
        <div class="main2">
            
            <div class="thank-you-card">
                <span class="premium-sparkle">✨👑✨</span>
                <h1>欢迎加入 Premium！</h1>
                <h2>您在日本的未来从这里开始。</h2>
                
                <p>
                    感谢您的支持！<br>
                    您的付款已成功完成。<br>
                    您现在可以无限访问所有类别，包括 <br>
                    <strong>商务日语</strong> 和 <strong>生活实用日语</strong>。
                </p>

                <a href="{% url 'toppagezhCN' %}?status=premium_success" class="back-home-btn">
                    返回首页并开始探索 🌸
                </a>
            </div>

        </div>
    </div>
</div>

{% endblock %}
